name: Docker Push

# 仅允许手动触发，避免 push 到 main 时自动打包并推送镜像。
on:
  workflow_dispatch:

env:
  RUST_BACKTRACE: short
  HUSKY: 0

concurrency:
  group: docker-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build web assets
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload web assets
        uses: actions/upload-artifact@v4
        with:
          name: codeg-web
          path: out
          retention-days: 1

  build-server:
    name: Build server ${{ matrix.name }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux amd64
            target: x86_64-unknown-linux-gnu
            artifact: codeg-server-linux-amd64
          - name: Linux arm64
            target: aarch64-unknown-linux-gnu
            artifact: codeg-server-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: docker-server-${{ matrix.target }}

      - name: Install Linux arm64 cross compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cat > /tmp/sources.list << 'EOF'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-backports main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse

          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          EOF
          sudo mv /etc/apt/sources.list /etc/apt/sources.list.default
          sudo mv /tmp/sources.list /etc/apt/sources.list
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libssl-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc-ar" >> "$GITHUB_ENV"

      - name: Build server and MCP companion
        working-directory: src-tauri
        run: |
          cargo build --release --bin codeg-server --no-default-features --target ${{ matrix.target }}
          cargo build --release --bin codeg-mcp --no-default-features --target ${{ matrix.target }}

      - name: Package server binaries
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp src-tauri/target/${{ matrix.target }}/release/codeg-server dist/${{ matrix.artifact }}/
          cp src-tauri/target/${{ matrix.target }}/release/codeg-mcp dist/${{ matrix.artifact }}/
          chmod +x dist/${{ matrix.artifact }}/codeg-server dist/${{ matrix.artifact }}/codeg-mcp

      - name: Smoke test native companion
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: dist/${{ matrix.artifact }}/codeg-mcp --help | grep -F 'codeg-mcp --parent-connection-id'

      - name: Upload server binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  build-docker:
    name: Build and push Docker image
    runs-on: ubuntu-22.04
    needs:
      - build-web
      - build-server
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: codeg-web
          path: artifacts/web

      - name: Download Linux amd64 server
        uses: actions/download-artifact@v4
        with:
          name: codeg-server-linux-amd64
          path: artifacts/linux-amd64

      - name: Download Linux arm64 server
        uses: actions/download-artifact@v4
        with:
          name: codeg-server-linux-arm64
          path: artifacts/linux-arm64

      - name: Prepare Docker build context
        run: |
          set -euo pipefail
          mkdir -p dist/amd64 dist/arm64 dist/web
          cp artifacts/linux-amd64/codeg-server dist/amd64/codeg-server
          cp artifacts/linux-amd64/codeg-mcp dist/amd64/codeg-mcp
          cp artifacts/linux-arm64/codeg-server dist/arm64/codeg-server
          cp artifacts/linux-arm64/codeg-mcp dist/arm64/codeg-mcp
          cp -r artifacts/web/. dist/web/
          chmod +x dist/amd64/codeg-server dist/amd64/codeg-mcp \
                   dist/arm64/codeg-server dist/arm64/codeg-mcp
          test -x dist/amd64/codeg-server
          test -x dist/amd64/codeg-mcp
          test -x dist/arm64/codeg-server
          test -x dist/arm64/codeg-mcp
          test -f dist/web/index.html

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
