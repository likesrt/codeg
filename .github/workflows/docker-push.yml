name: Docker Push

# 仅允许手动触发，避免 push 到 main 时自动打包并推送镜像。
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to push, e.g. latest, manual, main-20260528"
        required: true
        type: string
        default: latest
      platforms:
        description: "Target platforms for the local workstation image"
        required: true
        type: string
        default: linux/amd64,linux/arm64

env:
  RUST_BACKTRACE: short
  HUSKY: 0

concurrency:
  group: docker-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docker:
    name: Build and push local Docker image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate target platforms input
        shell: bash
        run: |
          INPUT="${{ inputs.platforms }}"
          # Trim surrounding whitespace
          INPUT="${INPUT#"${INPUT%%[![:space:]]*}"}"
          INPUT="${INPUT%"${INPUT##*[![:space:]]}"}"
          if [ -z "$INPUT" ]; then
            echo "::error::platforms input is empty"
            exit 1
          fi
          IFS=',' read -ra PLATS <<< "$INPUT"
          for p in "${PLATS[@]}"; do
            # Trim each token
            p="${p#"${p%%[![:space:]]*}"}"
            p="${p%"${p##*[![:space:]]}"}"
            if ! echo "$p" | grep -qE '^[a-z]+/[a-z0-9_]+$'; then
              echo "::error::Invalid platform token '${p}' in platforms input '${INPUT}'. Expected format like 'linux/amd64,linux/arm64'. Check for typos such as doubled letters (e.g. 'llinux')."
              exit 1
            fi
          done
          echo "Platforms validated: ${INPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,prefix=

      - name: Build and push local Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.local
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
