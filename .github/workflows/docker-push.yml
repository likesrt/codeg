name: Docker Push

# 仅允许手动触发，避免 push 到 main 时自动打包并推送镜像。
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to push, e.g. latest, manual, main-20260528"
        required: true
        type: string
        default: latest
      platforms:
        description: "Target platforms for the local workstation image"
        required: true
        type: string
        default: linux/amd64,linux/arm64

env:
  RUST_BACKTRACE: short
  HUSKY: 0

concurrency:
  group: docker-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-platforms:
    name: Validate target platforms input
    runs-on: ubuntu-22.04
    outputs:
      platforms: ${{ steps.validate.outputs.platforms }}
      amd64: ${{ steps.validate.outputs.amd64 }}
      arm64: ${{ steps.validate.outputs.arm64 }}
    steps:
      - id: validate
        shell: bash
        run: |
          INPUT="${{ inputs.platforms }}"
          INPUT="${INPUT#"${INPUT%%[![:space:]]*}"}"
          INPUT="${INPUT%"${INPUT##*[![:space:]]}"}"
          if [ -z "$INPUT" ]; then
            echo "::error::platforms input is empty"
            exit 1
          fi

          normalized=""
          amd64=false
          arm64=false
          IFS=',' read -ra PLATS <<< "$INPUT"
          for p in "${PLATS[@]}"; do
            p="${p#"${p%%[![:space:]]*}"}"
            p="${p%"${p##*[![:space:]]}"}"
            case "$p" in
              linux/amd64)
                amd64=true
                ;;
              linux/arm64)
                arm64=true
                ;;
              *)
                echo "::error::Unsupported platform '${p}'. Supported platforms: linux/amd64,linux/arm64."
                exit 1
                ;;
            esac
            if [ -z "$normalized" ]; then
              normalized="$p"
            else
              normalized="$normalized,$p"
            fi
          done

          echo "platforms=$normalized" >> "$GITHUB_OUTPUT"
          echo "amd64=$amd64" >> "$GITHUB_OUTPUT"
          echo "arm64=$arm64" >> "$GITHUB_OUTPUT"
          echo "Platforms validated: $normalized"

  # 前端构建：和 Rust 编译并行，产出 Next.js 静态导出
  build-frontend:
    name: Build frontend
    needs: validate-platforms
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: out
          retention-days: 1

  # 后端编译：仅编译 inputs.platforms 选择的架构，和前端的编译并行跑
  build-backend:
    name: Build backend (${{ matrix.arch }})
    needs: validate-platforms
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Skip unselected architecture
        id: selected
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            enabled="${{ needs.validate-platforms.outputs.amd64 }}"
          else
            enabled="${{ needs.validate-platforms.outputs.arm64 }}"
          fi

          if [ "$enabled" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Building ${{ matrix.arch }} because platforms='${{ needs.validate-platforms.outputs.platforms }}'"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.arch }} because platforms='${{ needs.validate-platforms.outputs.platforms }}'"
          fi

      - name: Install Rust stable
        if: steps.selected.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        if: steps.selected.outputs.enabled == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: ${{ matrix.target }}

      - name: Install arm64 cross compiler
        if: steps.selected.outputs.enabled == 'true' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cat > /tmp/sources.list << 'EOF'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-backports main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse

          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          EOF
          sudo mv /etc/apt/sources.list /etc/apt/sources.list.default
          sudo mv /tmp/sources.list /etc/apt/sources.list

          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libssl-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc-ar" >> "$GITHUB_ENV"

      - name: Build server + codeg-mcp companion
        if: steps.selected.outputs.enabled == 'true'
        working-directory: src-tauri
        run: |
          cargo build --release --bin codeg-server --no-default-features --target ${{ matrix.target }}
          cargo build --release --bin codeg-mcp --no-default-features --target ${{ matrix.target }}

      - name: Package binaries
        if: steps.selected.outputs.enabled == 'true'
        run: |
          mkdir -p dist/${{ matrix.arch }}
          cp src-tauri/target/${{ matrix.target }}/release/codeg-server dist/${{ matrix.arch }}/
          cp src-tauri/target/${{ matrix.target }}/release/codeg-mcp dist/${{ matrix.arch }}/
          chmod +x dist/${{ matrix.arch }}/codeg-server dist/${{ matrix.arch }}/codeg-mcp

      - name: Smoke test (native targets only)
        if: steps.selected.outputs.enabled == 'true' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          test -x "dist/${{ matrix.arch }}/codeg-server"
          test -x "dist/${{ matrix.arch }}/codeg-mcp"
          "dist/${{ matrix.arch }}/codeg-mcp" --help | grep -F 'codeg-mcp --parent-connection-id'

      - name: Upload backend artifact
        if: steps.selected.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codeg-backend-${{ matrix.arch }}
          path: dist/${{ matrix.arch }}
          retention-days: 1

  # Docker 镜像组装：下载预编译产物，COPY 进镜像，多架构推送
  build-docker:
    name: Build and push local Docker image
    needs: [validate-platforms, build-frontend, build-backend]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: web
          path: dist/web

      - name: Download amd64 backend artifact
        if: needs.validate-platforms.outputs.amd64 == 'true'
        uses: actions/download-artifact@v4
        with:
          name: codeg-backend-amd64
          path: dist/amd64

      - name: Download arm64 backend artifact
        if: needs.validate-platforms.outputs.arm64 == 'true'
        uses: actions/download-artifact@v4
        with:
          name: codeg-backend-arm64
          path: dist/arm64

      - name: Restore exec permissions (lost during artifact upload)
        shell: bash
        run: |
          IFS=',' read -ra PLATS <<< "${{ needs.validate-platforms.outputs.platforms }}"
          for p in "${PLATS[@]}"; do
            p="${p#"${p%%[![:space:]]*}"}"
            p="${p%"${p##*[![:space:]]}"}"
            arch="${p#linux/}"
            chmod +x "dist/${arch}/codeg-server" "dist/${arch}/codeg-mcp" || true
            file "dist/${arch}/codeg-server" "dist/${arch}/codeg-mcp" || true
          done

      - name: Verify Docker build context
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -ra PLATS <<< "${{ needs.validate-platforms.outputs.platforms }}"
          for p in "${PLATS[@]}"; do
            p="${p#"${p%%[![:space:]]*}"}"
            p="${p%"${p##*[![:space:]]}"}"
            arch="${p#linux/}"
            for f in "dist/${arch}/codeg-server" "dist/${arch}/codeg-mcp"; do
              test -x "$f" || { echo "FATAL: $f missing or non-exec"; exit 1; }
            done
          done
          test -f dist/web/index.html || { echo "FATAL: frontend static export missing"; exit 1; }
          echo "Docker build context is valid"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,prefix=

      - name: Build and push local Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.local.ci
          platforms: ${{ needs.validate-platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
