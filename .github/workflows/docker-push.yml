name: Docker Push

# 仅允许手动触发，避免 push 到 main 时自动打包并推送镜像。
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to push, e.g. latest, manual, main-20260528"
        required: true
        type: string
        default: latest
      platforms:
        description: "Target platforms for the local workstation image"
        required: true
        type: string
        default: linux/amd64,linux/arm64

env:
  RUST_BACKTRACE: short
  HUSKY: 0

concurrency:
  group: docker-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docker:
    name: Build and push local Docker image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,prefix=

      - name: Build and push local Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.local
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
